name: Xcode Build

on:
  push:
    branches:
      - main
    tags:
      - appstore-*
  pull_request:
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: "Archive and upload a signed iOS build to TestFlight"
        required: true
        default: false
        type: boolean

jobs:
  simulator-build:
    name: Xcode build (iOS Simulator)
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Resolve packages
        run: |
          xcodebuild \
            -project NightfallProtocol.xcodeproj \
            -scheme NightfallProtocol \
            -resolvePackageDependencies

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          mkdir -p build/logs
          xcodebuild \
            -project NightfallProtocol.xcodeproj \
            -scheme NightfallProtocol \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build | tee build/logs/xcodebuild-ios-simulator.log

      - name: Summarize Xcode errors
        if: failure()
        run: |
          if [ -f build/logs/xcodebuild-ios-simulator.log ]; then
            grep -E "error:|warning:|BUILD FAILED|The following build commands failed|No such module|cannot find|ambiguous|unavailable|Command .* failed" build/logs/xcodebuild-ios-simulator.log | tail -n 80 > build/logs/xcodebuild-errors.log || true
            if [ ! -s build/logs/xcodebuild-errors.log ]; then
              tail -n 120 build/logs/xcodebuild-ios-simulator.log > build/logs/xcodebuild-errors.log
            fi
            echo "### Xcode failure excerpt (iOS Simulator)" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            cat build/logs/xcodebuild-errors.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            while IFS= read -r line; do
              [ -n "$line" ] && echo "::error::$line"
            done < build/logs/xcodebuild-errors.log
          fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-ios-simulator-log
          path: build/logs/
          if-no-files-found: ignore

  testflight-upload:
    name: Archive and upload iOS to TestFlight
    runs-on: macos-26
    if: (github.event_name == 'workflow_dispatch' && inputs.upload_to_testflight == true) || startsWith(github.ref, 'refs/tags/appstore-')
    env:
      APP_IDENTIFIER: com.nightfallprotocol.prototype
      APP_STORE_APP_ID: "6772583753"
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      FASTLANE_HIDE_GITHUB_ISSUES: "1"
      IOS_PROFILE_NAME: NightfallProtocol_iOS_App_Store_${{ github.run_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate signing secrets
        run: |
          missing=0
          for name in APPLE_TEAM_ID ASC_KEY_ID ASC_ISSUER_ID ASC_KEY_P8_BASE64 BUILD_CERTIFICATE_BASE64 P12_PASSWORD KEYCHAIN_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required GitHub secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Write App Store Connect API key
        run: |
          mkdir -p private_keys
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "private_keys/AuthKey_${ASC_KEY_ID}.p8"
          echo "ASC_KEY_PATH=$PWD/private_keys/AuthKey_${ASC_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Remove promoted IAP images
        run: |
          for product_id in \
            "com.nightfallprotocol.pass.premium" \
            "com.nightfallprotocol.subscription.premium" \
            "com.nightfallprotocol.cosmetic.starter" \
            "com.nightfallprotocol.cosmetic.nightmare"; do
            python3 .github/scripts/upload-iap-promotional-image.py "$product_id" || \
              echo "::warning::Could not remove promoted IAP image for ${product_id}; continuing."
          done

      - name: Install Apple signing assets
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/nightfall-signing.keychain-db"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "BUILD_CERTIFICATE_PATH=$CERTIFICATE_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Ensure iOS App Store profile
        run: |
          set +e
          mkdir -p build/logs
          bash .github/scripts/ensure-game-center-profile.sh "$IOS_PROFILE_NAME" "IOS_APP_STORE" 2>&1 | tee build/logs/ensure-ios-profile.log
          profile_status="${PIPESTATUS[0]}"
          if [ "$profile_status" -ne 0 ]; then
            tail -n 80 build/logs/ensure-ios-profile.log | while IFS= read -r line; do
              [ -n "$line" ] && echo "::error::${line}"
            done
          fi
          exit "$profile_status"

      - name: Install iOS App Store profile
        run: |
          bash .github/scripts/install-provisioning-profile.sh \
            "$IOS_PROFILE_NAME" \
            "IOS_APP_STORE" \
            "$RUNNER_TEMP/nightfall-ios.mobileprovision" \
            "PROFILE_SPECIFIER"

      - name: Show Xcode version
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Archive and upload iOS
        id: upload_ios
        run: |
          set -o pipefail
          mkdir -p build/logs
          bundle exec fastlane ios build_upload_ios 2>&1 | tee build/logs/fastlane-ios-upload.log

      - name: Collect upload diagnostics
        if: always()
        run: |
          mkdir -p build/logs
          diagnostics_file="build/logs/upload-diagnostics.log"
          : > "$diagnostics_file"

          append_excerpt() {
            local label="$1"
            local file="$2"
            [ -f "$file" ] || return 0
            {
              echo "## ${label}"
              echo "${file}"
              grep -Ei "error:|warning:|failed|no profiles|provision|certificate|codesign|signing|export|archive|app store|transporter|upload|xcodebuild|gym|fastlane" "$file" | tail -n 220 || tail -n 160 "$file"
              echo
            } >> "$diagnostics_file"
          }

          append_excerpt "Fastlane iOS upload" "build/logs/fastlane-ios-upload.log"

          if [ -d "$HOME/Library/Logs/gym" ]; then
            while IFS= read -r file; do
              append_excerpt "gym log" "$file"
            done < <(find "$HOME/Library/Logs/gym" -type f | sort)
          fi

          if [ -s "$diagnostics_file" ]; then
            echo "### Upload diagnostics excerpt" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -n 140 "$diagnostics_file" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Summarize upload result
        if: always()
        env:
          IOS_OUTCOME: ${{ steps.upload_ios.outcome }}
        run: |
          {
            echo "### Platform upload results"
            echo
            echo "| Platform | Outcome |"
            echo "| --- | --- |"
            echo "| iOS | ${IOS_OUTCOME} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NightfallProtocol-iOS-archive
          path: |
            build/logs/**/*
            build/export/**/*.ipa
            build/export/**/*.dSYM.zip
          if-no-files-found: ignore
