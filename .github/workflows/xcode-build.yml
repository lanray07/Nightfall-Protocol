name: Xcode Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: "Archive and upload a signed build to TestFlight"
        required: true
        default: false
        type: boolean

jobs:
  simulator-build:
    name: Xcode simulator build
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Resolve packages
        run: |
          xcodebuild \
            -project NightfallProtocol.xcodeproj \
            -scheme NightfallProtocol \
            -resolvePackageDependencies

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          mkdir -p build/logs
          xcodebuild \
            -project NightfallProtocol.xcodeproj \
            -scheme NightfallProtocol \
            -configuration Debug \
            -destination "generic/platform=iOS Simulator" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build | tee build/logs/xcodebuild-simulator.log

      - name: Summarize Xcode errors
        if: failure()
        run: |
          if [ -f build/logs/xcodebuild-simulator.log ]; then
            grep -E "error:|warning:|BUILD FAILED|The following build commands failed|No such module|cannot find|ambiguous|unavailable|Command .* failed" build/logs/xcodebuild-simulator.log | tail -n 80 > build/logs/xcodebuild-errors.log || true
            if [ ! -s build/logs/xcodebuild-errors.log ]; then
              tail -n 120 build/logs/xcodebuild-simulator.log > build/logs/xcodebuild-errors.log
            fi
            echo "### Xcode failure excerpt" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            cat build/logs/xcodebuild-errors.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            while IFS= read -r line; do
              [ -n "$line" ] && echo "::error::$line"
            done < build/logs/xcodebuild-errors.log
          fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-simulator-log
          path: build/logs/
          if-no-files-found: ignore

  testflight-upload:
    name: Archive and upload to TestFlight
    runs-on: macos-15
    if: github.event_name == 'workflow_dispatch' && inputs.upload_to_testflight == true
    env:
      APP_IDENTIFIER: com.nightfallprotocol.prototype
      APP_STORE_APP_ID: "6772583753"
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      FASTLANE_HIDE_GITHUB_ISSUES: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate signing secrets
        run: |
          missing=0
          for name in APPLE_TEAM_ID ASC_KEY_ID ASC_ISSUER_ID ASC_KEY_P8_BASE64; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required GitHub secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Write App Store Connect API key
        run: |
          mkdir -p private_keys
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "private_keys/AuthKey_${ASC_KEY_ID}.p8"
          echo "ASC_KEY_PATH=$PWD/private_keys/AuthKey_${ASC_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Show Xcode version
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Archive and upload
        run: bundle exec fastlane ios build_upload

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NightfallProtocol-ipa
          path: |
            build/export/*.ipa
            build/export/*.dSYM.zip
          if-no-files-found: ignore
