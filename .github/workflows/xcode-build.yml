name: Xcode Build

on:
  push:
    branches:
      - main
    tags:
      - appstore-*
  pull_request:
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: "Archive and upload a signed build to TestFlight"
        required: true
        default: false
        type: boolean

jobs:
  simulator-build:
    name: Xcode build (${{ matrix.platform_name }})
    runs-on: macos-26
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_name: iOS Simulator
            artifact_slug: ios-simulator
            destination: generic/platform=iOS Simulator
            sdk: iphonesimulator
            log_name: xcodebuild-ios-simulator.log
          - platform_name: tvOS Simulator
            artifact_slug: tvos-simulator
            destination: generic/platform=tvOS Simulator
            sdk: appletvsimulator
            log_name: xcodebuild-tvos-simulator.log
          - platform_name: visionOS Simulator
            artifact_slug: visionos-simulator
            destination: generic/platform=visionOS Simulator
            sdk: xrsimulator
            log_name: xcodebuild-visionos-simulator.log
          - platform_name: Mac Catalyst
            artifact_slug: maccatalyst
            destination: generic/platform=macOS,variant=Mac Catalyst
            sdk: macosx
            log_name: xcodebuild-maccatalyst.log
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Resolve packages
        run: |
          xcodebuild \
            -project NightfallProtocol.xcodeproj \
            -scheme NightfallProtocol \
            -resolvePackageDependencies

      - name: Build for ${{ matrix.platform_name }}
        run: |
          set -o pipefail
          mkdir -p build/logs
          xcodebuild \
            -project NightfallProtocol.xcodeproj \
            -scheme NightfallProtocol \
            -configuration Debug \
            -sdk "${{ matrix.sdk }}" \
            -destination "${{ matrix.destination }}" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build | tee "build/logs/${{ matrix.log_name }}"

      - name: Summarize Xcode errors
        if: failure()
        run: |
          if [ -f "build/logs/${{ matrix.log_name }}" ]; then
            grep -E "error:|warning:|BUILD FAILED|The following build commands failed|No such module|cannot find|ambiguous|unavailable|Command .* failed" "build/logs/${{ matrix.log_name }}" | tail -n 80 > build/logs/xcodebuild-errors.log || true
            if [ ! -s build/logs/xcodebuild-errors.log ]; then
              tail -n 120 "build/logs/${{ matrix.log_name }}" > build/logs/xcodebuild-errors.log
            fi
            echo "### Xcode failure excerpt (${{ matrix.platform_name }})" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            cat build/logs/xcodebuild-errors.log >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            while IFS= read -r line; do
              [ -n "$line" ] && echo "::error::$line"
            done < build/logs/xcodebuild-errors.log
          fi

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-${{ matrix.artifact_slug }}-log
          path: build/logs/
          if-no-files-found: ignore

  testflight-upload:
    name: Archive and upload to TestFlight
    runs-on: macos-26
    if: (github.event_name == 'workflow_dispatch' && inputs.upload_to_testflight == true) || startsWith(github.ref, 'refs/tags/appstore-')
    env:
      APP_IDENTIFIER: com.nightfallprotocol.prototype
      APP_STORE_APP_ID: "6772583753"
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
      ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      FASTLANE_SKIP_UPDATE_CHECK: "1"
      FASTLANE_HIDE_GITHUB_ISSUES: "1"
      MACCATALYST_PROFILE_NAME: NightfallProtocol_MacCatalyst_App_Store_${{ github.run_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate signing secrets
        run: |
          missing=0
          for name in APPLE_TEAM_ID ASC_KEY_ID ASC_ISSUER_ID ASC_KEY_P8_BASE64 BUILD_CERTIFICATE_BASE64 P12_PASSWORD KEYCHAIN_PASSWORD; do
            if [ -z "${!name}" ]; then
              echo "::error::Missing required GitHub secret: ${name}"
              missing=1
            fi
          done
          exit "$missing"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Write App Store Connect API key
        run: |
          mkdir -p private_keys
          echo "$ASC_KEY_P8_BASE64" | base64 --decode > "private_keys/AuthKey_${ASC_KEY_ID}.p8"
          echo "ASC_KEY_PATH=$PWD/private_keys/AuthKey_${ASC_KEY_ID}.p8" >> "$GITHUB_ENV"

      - name: Remove promoted IAP images
        run: |
          for product_id in \
            "com.nightfallprotocol.pass.premium" \
            "com.nightfallprotocol.cosmetic.starter" \
            "com.nightfallprotocol.cosmetic.nightmare"; do
            python3 .github/scripts/upload-iap-promotional-image.py "$product_id" || \
              echo "::warning::Could not remove promoted IAP image for ${product_id}; continuing."
          done

      - name: Install Apple signing assets
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/nightfall-signing.keychain-db"

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "BUILD_CERTIFICATE_PATH=$CERTIFICATE_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Prepare Mac installer certificate
        continue-on-error: true
        run: bash .github/scripts/ensure-mac-installer-certificate.sh

      - name: Ensure Mac Catalyst App Store profile
        run: |
          set +e
          mkdir -p build/logs
          bash .github/scripts/ensure-game-center-profile.sh "$MACCATALYST_PROFILE_NAME" "MAC_APP_STORE" 2>&1 | tee build/logs/ensure-maccatalyst-profile.log
          profile_status="${PIPESTATUS[0]}"
          if [ "$profile_status" -ne 0 ]; then
            tail -n 80 build/logs/ensure-maccatalyst-profile.log | while IFS= read -r line; do
              [ -n "$line" ] && echo "::error::${line}"
            done
          fi
          exit "$profile_status"

      - name: Install Mac Catalyst App Store profile
        run: |
          bash .github/scripts/install-provisioning-profile.sh \
            "$MACCATALYST_PROFILE_NAME" \
            "MAC_APP_STORE" \
            "$RUNNER_TEMP/nightfall-maccatalyst.mobileprovision" \
            "MACCATALYST_PROFILE_SPECIFIER"

      - name: Show Xcode version
        run: |
          xcode-select -p
          xcodebuild -version

      - name: Archive and upload Mac Catalyst
        id: upload_maccatalyst
        continue-on-error: true
        run: |
          set +e
          mkdir -p build/logs
          bundle exec fastlane ios build_upload_maccatalyst 2>&1 | tee build/logs/fastlane-maccatalyst-upload.log
          fastlane_status="${PIPESTATUS[0]}"

          if [ "$fastlane_status" -ne 0 ]; then
            echo "::error::Mac Catalyst Fastlane upload failed with exit code ${fastlane_status}."
            emit_reversed_tail() {
              local label="$1"
              local file="$2"
              [ -f "$file" ] || return 0
              echo "::error::Newest ${label} lines follow."
              tail -n 120 "$file" | awk '{ lines[NR] = $0 } END { for (i = NR; i >= 1; i--) print lines[i] }' | head -n 35 | while IFS= read -r line; do
                [ -n "$line" ] && echo "::error::${line}"
              done
            }
            find_distribution_logs() {
              for root in "$RUNNER_TEMP" "${TMPDIR:-/tmp}" "$HOME/Library/Developer/Xcode" "$HOME/Library/Logs" /tmp; do
                [ -d "$root" ] || continue
                find "$root" -type f \( -path "*.xcdistributionlogs/*" -o -iname "*distribution*.log" -o -iname "IDEDistribution*.log" \) -print 2>/dev/null || true
              done | awk '!seen[$0]++'
            }

            distribution_log_count=0
            while IFS= read -r distribution_log; do
              echo "::error::Xcode distribution log candidate: ${distribution_log}"
              emit_reversed_tail "Xcode distribution log" "$distribution_log"
              distribution_log_count=$((distribution_log_count + 1))
              [ "$distribution_log_count" -ge 3 ] && break
            done < <(find_distribution_logs)
            if [ -d "$HOME/Library/Developer/Xcode/Archives" ]; then
              while IFS= read -r distribution_log; do
                emit_reversed_tail "Xcode distribution log" "$distribution_log"
                distribution_log_count=$((distribution_log_count + 1))
                [ "$distribution_log_count" -ge 3 ] && break
              done < <(find "$HOME/Library/Developer/Xcode/Archives" -type f \( -name "*.log" -o -name "*.txt" \) -print | xargs ls -t 2>/dev/null || true)
            fi
            emit_reversed_tail "Fastlane output" "build/logs/fastlane-maccatalyst-upload.log"
            if [ -d "$HOME/Library/Logs/gym" ]; then
              while IFS= read -r gym_log; do
                emit_reversed_tail "raw gym log" "$gym_log"
              done < <(find "$HOME/Library/Logs/gym" -type f -name "*.log" | sort)
            fi
          fi

          exit "$fastlane_status"

      - name: Collect upload diagnostics
        if: always()
        run: |
          mkdir -p build/logs
          diagnostics_file="build/logs/upload-diagnostics.log"
          : > "$diagnostics_file"

          append_excerpt() {
            local label="$1"
            local file="$2"
            [ -f "$file" ] || return 0
            {
              echo "## ${label}"
              echo "${file}"
              grep -Ei "error:|warning:|failed|no profiles|provision|certificate|codesign|signing|export|archive|app store|transporter|upload|xcodebuild|gym|fastlane" "$file" | tail -n 220 || tail -n 160 "$file"
              echo
            } >> "$diagnostics_file"
          }

          append_excerpt "Fastlane Mac Catalyst upload" "build/logs/fastlane-maccatalyst-upload.log"

          if [ -d "$HOME/Library/Logs/gym" ]; then
            while IFS= read -r file; do
              append_excerpt "gym log" "$file"
            done < <(find "$HOME/Library/Logs/gym" -type f | sort)
          fi

          if [ -s "$diagnostics_file" ]; then
            echo "### Upload diagnostics excerpt" >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            tail -n 140 "$diagnostics_file" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Summarize upload results
        if: always()
        env:
          MACCATALYST_OUTCOME: ${{ steps.upload_maccatalyst.outcome }}
        run: |
          {
            echo "### Platform upload results"
            echo
            echo "| Platform | Outcome |"
            echo "| --- | --- |"
            echo "| Mac Catalyst | ${MACCATALYST_OUTCOME} |"
          } >> "$GITHUB_STEP_SUMMARY"

          failed=0
          for outcome in "$MACCATALYST_OUTCOME"; do
            [ "$outcome" = "success" ] || failed=1
          done
          exit "$failed"

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: NightfallProtocol-platform-archives
          path: |
            build/logs/**/*
            build/export/**/*.ipa
            build/export/**/*.pkg
            build/export/**/*.dSYM.zip
          if-no-files-found: ignore
